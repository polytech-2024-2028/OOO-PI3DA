name: Check PR Structure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-structure:
    name: validate-structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only -z ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > files.txt
          else
            git diff --name-only -z HEAD~1 HEAD > files.txt
          fi

      - name: Validate structure
        run: |
          SURNAMES=()

          while IFS= read -r -d '' file; do
            echo "Файл: $file"

            if [[ $file == .github/* ]]; then
              echo "Пропуск служебного файла: $file"
              continue
            fi

            if ! [[ $file =~ ^sem[0-9]+/[^/]+/[^/]+/ ]]; then
              echo "ОШИБКА: Файл '$file' не соответствует структуре sem№/subject/surname/"
              exit 1
            fi

            IFS='/' read -r sem subject surname rest <<< "$file"
            SURNAMES+=("$surname")

          done < files.txt

          if [ ${#SURNAMES[@]} -eq 0 ]; then
            echo "Нет файлов для проверки"
            exit 0
          fi

          UNIQUE_SURNAMES=($(printf "%s\n" "${SURNAMES[@]}" | sort -u))

          if [ ${#UNIQUE_SURNAMES[@]} -ne 1 ]; then
            echo "ОШИБКА: PR затрагивает файлы разных студентов!"
            echo "Найдены фамилии: ${UNIQUE_SURNAMES[*]}"
            exit 1
          fi

          echo "OK: ${UNIQUE_SURNAMES[0]}"